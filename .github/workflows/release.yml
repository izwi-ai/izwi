name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_suffix: linux-x86_64
            bundle_kind: deb
            bundle_ext: deb
          - os: windows-latest
            asset_suffix: windows-x86_64
            bundle_kind: nsis
            bundle_ext: exe
          - os: macos-latest
            asset_suffix: macos
            bundle_kind: dmg
            bundle_ext: dmg
    env:
      # Kept at job scope for step conditions only.
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APTABASE_APP_KEY: ${{ secrets.APTABASE_APP_KEY }}
      IZWI_UPDATER_PUBKEY: ${{ secrets.IZWI_UPDATER_PUBKEY }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate updater signing inputs (beta channel)
        if: startsWith(github.ref_name, 'v0.1.0-beta-')
        shell: bash
        run: |
          if [ -z "${IZWI_UPDATER_PUBKEY}" ]; then
            echo "::error::Missing IZWI_UPDATER_PUBKEY secret."
            exit 1
          fi
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]; then
            echo "::error::Missing TAURI_SIGNING_PRIVATE_KEY secret."
            exit 1
          fi
          if [[ "${IZWI_UPDATER_PUBKEY}" == \$* ]]; then
            echo "::error::IZWI_UPDATER_PUBKEY looks like an unresolved placeholder ('${IZWI_UPDATER_PUBKEY}')."
            exit 1
          fi
          if [[ "${TAURI_SIGNING_PRIVATE_KEY}" == \$* ]]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY looks like an unresolved placeholder."
            exit 1
          fi

      - name: Install Linux dependencies for Tauri
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Inject updater pubkey into Tauri config (beta channel)
        if: startsWith(github.ref_name, 'v0.1.0-beta-')
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'crates/izwi-desktop/tauri.conf.json';
          const pubkey = (process.env.IZWI_UPDATER_PUBKEY || '').trim();
          if (!pubkey) {
            throw new Error('IZWI_UPDATER_PUBKEY is empty after trimming.');
          }
          const config = JSON.parse(fs.readFileSync(path, 'utf8'));
          config.plugins = config.plugins || {};
          config.plugins.updater = config.plugins.updater || {};
          config.plugins.updater.pubkey = pubkey;
          fs.writeFileSync(path, `${JSON.stringify(config, null, 2)}\n`);
          NODE

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install UI dependencies (for Tauri beforeBuildCommand)
        run: npm ci --prefix ui

      - name: Build UI dist (required by izwi-desktop compile-time Tauri config)
        run: npm --prefix ui run build

      - name: Build CLI, server, and desktop binaries
        run: |
          # izwi-desktop bundles izwi/izwi-server as resources, so build those first.
          cargo build --release --bin izwi --bin izwi-server
          cargo build --release --bin izwi-desktop

      - name: Package terminal binaries (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release-assets
          tar -czf "release-assets/izwi-cli-${{ github.ref_name }}-${{ matrix.asset_suffix }}.tar.gz" \
            -C target/release \
            izwi izwi-server izwi-desktop

      - name: Package terminal binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Compress-Archive -Path `
            target/release/izwi.exe, `
            target/release/izwi-server.exe, `
            target/release/izwi-desktop.exe `
            -DestinationPath "release-assets/izwi-cli-${{ github.ref_name }}-${{ matrix.asset_suffix }}.zip" `
            -Force

      - name: Include macOS uninstall helper
        if: runner.os == 'macOS'
        run: |
          mkdir -p release-assets
          cp scripts/uninstall-macos.sh "release-assets/uninstall-izwi-macos.sh"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked --version "^2.0"

      - name: Build desktop bundle (Linux)
        if: runner.os == 'Linux'
        env:
          CI: "true"
        run: |
          cargo tauri build \
            --bundles deb,appimage

      - name: Build desktop bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CI: "true"
        run: |
          cargo tauri build --bundles ${{ matrix.bundle_kind }}

      - name: Build desktop bundle (unsigned macOS)
        if: runner.os == 'macOS' && env.APPLE_SIGNING_IDENTITY == ''
        env:
          CI: "true"
        run: |
          env -u APPLE_SIGNING_IDENTITY \
            -u APPLE_CERTIFICATE \
            -u APPLE_CERTIFICATE_PASSWORD \
            -u APPLE_ID \
            -u APPLE_PASSWORD \
            -u APPLE_TEAM_ID \
            cargo tauri build \
            --bundles app,${{ matrix.bundle_kind }} \
            --config crates/izwi-desktop/tauri.macos.conf.json

      - name: Build desktop bundle (signed macOS)
        if: runner.os == 'macOS' && env.APPLE_SIGNING_IDENTITY != ''
        env:
          CI: "true"
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cargo tauri build \
            --bundles app,${{ matrix.bundle_kind }} \
            --config crates/izwi-desktop/tauri.macos.conf.json

      - name: Collect updater artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          appimage_path="$(
            (
              find target -type f -path "*/release/bundle/appimage/*.AppImage" 2>/dev/null
              find crates/izwi-desktop/target -type f -path "*/release/bundle/appimage/*.AppImage" 2>/dev/null
            ) | head -n 1
          )"
          if [ -z "$appimage_path" ]; then
            echo "Could not find AppImage updater bundle."
            exit 1
          fi
          sig_path="${appimage_path}.sig"
          if [ ! -f "$sig_path" ]; then
            echo "Could not find AppImage updater signature at $sig_path."
            exit 1
          fi
          cp "$appimage_path" release-assets/
          cp "$sig_path" release-assets/

      - name: Collect updater artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          updater_bundle="$(
            (
              find target -type f -path "*/release/bundle/macos/*.app.tar.gz" 2>/dev/null
              find crates/izwi-desktop/target -type f -path "*/release/bundle/macos/*.app.tar.gz" 2>/dev/null
            ) | head -n 1
          )"
          if [ -z "$updater_bundle" ]; then
            echo "Could not find macOS updater bundle (.app.tar.gz)."
            exit 1
          fi
          sig_path="${updater_bundle}.sig"
          if [ ! -f "$sig_path" ]; then
            echo "Could not find macOS updater signature at $sig_path."
            exit 1
          fi
          cp "$updater_bundle" release-assets/
          cp "$sig_path" release-assets/

      - name: Collect updater artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $preferredDirPattern = '[\\/]release[\\/]bundle[\\/]nsis[\\/]'
          $fallbackDirPattern = '[\\/]release[\\/]bundle[\\/]nsis-updater[\\/]'

          $candidates = Get-ChildItem -Path "target","crates/izwi-desktop/target" -Recurse -File |
            Where-Object {
              $_.Name -match '-setup\.exe$' -and
              (
                $_.FullName -match $preferredDirPattern -or
                $_.FullName -match $fallbackDirPattern
              )
            }

          $updaterBundle = $candidates |
            Sort-Object `
              @{ Expression = { $_.FullName -match $preferredDirPattern }; Descending = $true }, `
              @{ Expression = "LastWriteTime"; Descending = $true } |
            Select-Object -First 1

          if (-not $updaterBundle) {
            Write-Host "Discovered setup executables:"
            Get-ChildItem -Path "target","crates/izwi-desktop/target" -Recurse -File |
              Where-Object { $_.Name -match '-setup\.exe$' } |
              Select-Object -ExpandProperty FullName
            throw "Could not find Windows updater bundle (setup.exe) in nsis/nsis-updater."
          }

          $signaturePath = "$($updaterBundle.FullName).sig"
          if (-not (Test-Path $signaturePath)) {
            throw "Could not find Windows updater signature at $signaturePath."
          }

          Copy-Item $signaturePath -Destination release-assets

      - name: Collect desktop bundle artifact (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          bundle_path="$(
            (
              find target -type f \
                -path "*/release/bundle/${{ matrix.bundle_kind }}/*.${{ matrix.bundle_ext }}" 2>/dev/null
              find crates/izwi-desktop/target -type f \
                -path "*/release/bundle/${{ matrix.bundle_kind }}/*.${{ matrix.bundle_ext }}" 2>/dev/null
            ) | head -n 1
          )"
          if [ -z "$bundle_path" ]; then
            echo "Could not find desktop bundle for ${{ matrix.bundle_kind }}."
            exit 1
          fi
          cp "$bundle_path" release-assets/

      - name: Collect desktop bundle artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $preferredDirPattern = '[\\/]release[\\/]bundle[\\/]nsis[\\/]'
          $fallbackDirPattern = '[\\/]release[\\/]bundle[\\/]nsis-updater[\\/]'

          $bundleCandidates = Get-ChildItem -Path "target","crates/izwi-desktop/target" -Recurse -File |
            Where-Object {
              $_.Name -match '-setup\.exe$' -and
              (
                $_.FullName -match $preferredDirPattern -or
                $_.FullName -match $fallbackDirPattern
              )
            }

          $bundle = $bundleCandidates |
            Sort-Object `
              @{ Expression = { $_.FullName -match $preferredDirPattern }; Descending = $true }, `
              @{ Expression = "LastWriteTime"; Descending = $true } |
            Select-Object -First 1

          if (-not $bundle) {
            throw "Could not find desktop bundle for ${{ matrix.bundle_kind }} (setup.exe in nsis/nsis-updater)."
          }

          Copy-Item $bundle.FullName -Destination release-assets

      - name: Verify native release artifacts (Linux/macOS)
        if: runner.os != 'Windows'
        run: scripts/release/verify-native-artifacts.sh --artifact-dir release-assets

      - name: Verify native release artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: scripts/release/verify-native-artifacts.ps1 -ArtifactDir release-assets

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset_suffix }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Show release files
        run: ls -lah dist

      - name: Verify downloaded native release artifacts
        run: scripts/release/verify-native-artifacts.sh --artifact-dir dist

      - name: Generate release support note
        run: |
          cat > release-support.md <<'EOF'
          ## Runtime Support

          - macOS native artifacts are Metal-capable on Apple Silicon.
          - Linux and Windows native artifacts are CPU-only and intentionally do not bundle CUDA runtime libraries.
          - NVIDIA CUDA is supported through the Docker `production-cuda` target / `docker compose --profile cuda` and through source builds with `--features cuda`.
          - Native artifacts are checked for CUDA runtime payloads and per-file size before release publication.
          EOF

      - name: Generate beta updater manifest
        if: startsWith(github.ref_name, 'v0.1.0-beta-')
        run: |
          linux_bundle="$(find dist -maxdepth 1 -type f -name '*.AppImage' | head -n 1)"
          macos_bundle="$(find dist -maxdepth 1 -type f -name '*.app.tar.gz' | head -n 1)"
          windows_bundle="$(find dist -maxdepth 1 -type f -name '*-setup.exe' | head -n 1)"

          if [ -z "$linux_bundle" ] || [ -z "$macos_bundle" ] || [ -z "$windows_bundle" ]; then
            echo "::error::Missing updater bundles in dist/."
            exit 1
          fi

          linux_sig="${linux_bundle}.sig"
          macos_sig="${macos_bundle}.sig"
          windows_sig="${windows_bundle}.sig"

          if [ ! -f "$linux_sig" ] || [ ! -f "$macos_sig" ] || [ ! -f "$windows_sig" ]; then
            echo "::error::Missing one or more updater signature files in dist/."
            exit 1
          fi

          linux_sig_value="$(tr -d '\r\n' < "$linux_sig")"
          macos_sig_value="$(tr -d '\r\n' < "$macos_sig")"
          windows_sig_value="$(tr -d '\r\n' < "$windows_sig")"

          linux_name="$(basename "$linux_bundle")"
          macos_name="$(basename "$macos_bundle")"
          windows_name="$(basename "$windows_bundle")"
          published_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          cat > dist/latest-beta.json <<EOF
          {
            "version": "${{ github.ref_name }}",
            "notes": "Izwi beta release ${{ github.ref_name }}",
            "pub_date": "${published_at}",
            "platforms": {
              "linux": {
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${linux_name}",
                "signature": "${linux_sig_value}"
              },
              "macos": {
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${macos_name}",
                "signature": "${macos_sig_value}"
              },
              "windows": {
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${windows_name}",
                "signature": "${windows_sig_value}"
              }
            }
          }
          EOF

      - name: Validate beta updater manifest
        if: startsWith(github.ref_name, 'v0.1.0-beta-')
        run: |
          jq -e '.version and .platforms.linux.url and .platforms.linux.signature and .platforms.macos.url and .platforms.macos.signature and .platforms.windows.url and .platforms.windows.signature' dist/latest-beta.json > /dev/null

      - name: Enforce updater asset matrix consistency
        if: startsWith(github.ref_name, 'v0.1.0-beta-')
        run: |
          version="$(jq -r '.version' dist/latest-beta.json)"
          if [ "$version" != "${{ github.ref_name }}" ]; then
            echo "::error::latest-beta.json version ($version) does not match tag (${{ github.ref_name }})."
            exit 1
          fi

          jq -r '.platforms | to_entries[] | [.key, .value.url, .value.signature] | @tsv' dist/latest-beta.json | \
          while IFS=$'\t' read -r platform_key asset_url signature; do
            if [ -z "$signature" ] || [ "$signature" = "null" ]; then
              echo "::error::Missing signature for platform $platform_key."
              exit 1
            fi
            if [ "${#signature}" -lt 64 ]; then
              echo "::error::Signature for platform $platform_key looks too short."
              exit 1
            fi

            asset_name="$(basename "$asset_url")"
            if [ ! -f "dist/$asset_name" ]; then
              echo "::error::Manifest points to missing asset dist/$asset_name for platform $platform_key."
              exit 1
            fi
          done

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: Izwi ${{ github.ref_name }}
          body_path: release-support.md
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: dist/*
