name: OpenAI Compatibility

on:
  push:
    branches:
      - main
      - develop
      - "codex/**"
      - "feature/**"
  pull_request:

jobs:
  openai-compat:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      IZWI_OPENAI_COMPAT_PROFILE: strict
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run OpenAI compatibility tests
        run: cargo test -p izwi-server --bin izwi-server openai::
