name: Backend Truth

on:
  pull_request:
    paths:
      - ".github/workflows/backend-truth.yml"
      - ".github/workflows/release.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - "docker-compose.yml"
      - "config.docker.toml"
      - "crates/**"
      - "scripts/**"
      - "ui/**"
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/backend-truth.yml"
      - ".github/workflows/release.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - "docker-compose.yml"
      - "config.docker.toml"
      - "crates/**"
      - "scripts/**"
      - "ui/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-truth-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-cpu:
    name: Cargo Check (CPU)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Run CPU cargo checks
        run: scripts/ci/check-backend-truth.sh cargo-cpu

  cargo-cuda:
    name: Cargo Check (CUDA)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CUDA_COMPUTE_CAP: "80"
    container:
      image: nvidia/cuda:12.4.1-devel-ubuntu22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install container build dependencies
        run: |
          apt-get update
          apt-get install -y \
            build-essential \
            ca-certificates \
            curl \
            git \
            pkg-config \
            libssl-dev

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y \
            --profile minimal \
            --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Run CUDA cargo checks
        run: scripts/ci/check-backend-truth.sh cargo-cuda

  docker-cpu:
    name: Docker Build (CPU)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run CPU Docker build checks
        env:
          DOCKER_BUILDKIT: "1"
        run: scripts/ci/check-backend-truth.sh docker-cpu

  docker-cuda:
    name: Docker Build (CUDA)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DOCKER_BUILDKIT: "1"
      CUDA_COMPUTE_CAP: "80"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run CUDA Docker build checks
        run: scripts/ci/check-backend-truth.sh docker-cuda
